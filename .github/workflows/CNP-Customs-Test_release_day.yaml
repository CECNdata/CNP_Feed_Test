name: 'CNP-Customs-Test_release_day'

on:
  workflow_dispatch:
  schedule:
    - cron: '*/20 0-10 20 * *'

env:
  repo_name: CECNdata/GA-sec
  retry: 3

jobs:
  release_day:
    runs-on: ubuntu-latest
    strategy:
      matrix:
       include:
         - csv: CNP-Customs-total-import-RMB.csv
           line: 0-2
         - csv: CNP-Customs-total-import-USD.csv
           line: 0-2
         - csv: CNP-Customs-total-export-RMB.csv
           line: 0-2
         - csv: CNP-Customs-total-export-USD.csv
           line: 0-2
    steps:
      - name: Checkout codes
        uses: actions/checkout@v3
        with:
          repository: '${{ env.repo_name  }}'
          token: ${{ secrets.GH_PAT }} # `GH_PAT` is a secret that contains you PAT
          ref: main

      - name: Set up Python
        uses: actions/setup-python@v2
        with:
          python-version: 3.9

      - name: Install dependencies
        run: |
          cd customs
          python -m pip install --upgrade pip
          pip install fire
          pip install pipreqs
          pipreqs .
          pip install -r requirements.txt

      - uses: microsoft/playwright-github-action@v1

      - name: Install Playwright
        run: |
            python -m playwright install webkit

      - name: run customs download
        continue-on-error: true
        run: |
            cd feed/CNP-Customs-Test
            timeout 1800 python run_release_day.py  --path mapping/${{matrix.csv}} --line "${{matrix.line}}" --retry ${{env.retry}}  2>&1 
